version: "3.9"

services:
  api:
    build: ./api
    container_name: accentcoach-api
    ports:
      - "8000:8000"
    volumes:
      - ./api/data:/app/data
    environment:
      - WHISPER_MODEL=base
      - WHISPER_COMPUTE_TYPE=int8

  web:
    build: ./web
    container_name: accentcoach-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - api
