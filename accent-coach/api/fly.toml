# Fly.io config for FrontlineReady API
# Deploy: fly deploy (from accent-coach/api with Dockerfile.fly)

app = "frontlineready-api"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  WHISPER_MODEL = "tiny"
  WHISPER_COMPUTE_TYPE = "int8"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Optional: add persistent storage (run: fly volumes create frontlineready_data)
# Then uncomment below. Without it, jobs/uploads are ephemeral.
# [mounts]
#   source = "frontlineready_data"
#   destination = "/app/data"
